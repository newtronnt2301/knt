<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#06060a" />
  <title>เข้าสู่ระบบ — KNT Neural Interface</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Login page — JARVIS style */
    .login-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px; position: relative;
    }
    .login-card {
      width: 100%; max-width: 400px;
      background: linear-gradient(135deg, rgba(18,18,28,0.8) 0%, rgba(12,12,18,0.6) 100%);
      border: 1px solid var(--glass-brd);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      padding: 44px 36px 36px;
      position: relative; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(255,32,64,0.08);
    }
    /* Top accent line */
    .login-card::before {
      content: ""; position: absolute; top: 0; left: 20%; right: 20%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
    }
    /* Corner brackets */
    .login-card::after {
      content: ""; position: absolute; bottom: 6px; right: 6px;
      width: 14px; height: 14px;
      border: 1.5px solid var(--red);
      border-left: none; border-top: none;
      border-bottom-right-radius: 4px;
      opacity: 0.6;
    }
    .login-corner-tl {
      position: absolute; top: 6px; left: 6px;
      width: 14px; height: 14px;
      border: 1.5px solid var(--red);
      border-right: none; border-bottom: none;
      border-top-left-radius: 4px;
      opacity: 0.6;
    }

    .login-logo {
      display: flex; align-items: center; gap: 12px;
      justify-content: center; margin-bottom: 28px;
    }
    .login-logo .brand-mark svg { filter: drop-shadow(0 0 14px var(--red-glow)); }
    .login-title {
      font-family: var(--font-hud);
      text-align: center; font-size: 1.3rem; font-weight: 800;
      margin-bottom: 6px; letter-spacing: 0.08em;
      background: linear-gradient(120deg, #fff 30%, var(--red-bright) 110%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .login-sub {
      text-align: center; color: var(--text-dim); font-size: 0.84rem;
      margin-bottom: 32px;
      font-family: var(--mono);
      letter-spacing: 0.05em;
    }
    .login-sub .teacher-badge {
      display: inline-block; padding: 3px 10px; border-radius: 4px;
      font-family: var(--mono); font-size: 0.68rem; font-weight: 600;
      background: var(--red-soft); color: var(--red-bright);
      border: 1px solid rgba(255,32,64,0.25);
      letter-spacing: 0.1em;
    }
    .field-group { margin-bottom: 22px; }
    .field-label {
      display: block; font-size: 0.8rem; font-weight: 500;
      color: var(--text-dim); margin-bottom: 8px;
    }
    .field-icon-wrap {
      position: relative; display: flex; align-items: center;
    }
    .field-icon {
      position: absolute; left: 14px; color: var(--text-mute);
      pointer-events: none; z-index: 1;
    }
    .login-input {
      width: 100%; padding: 14px 14px 14px 44px;
      border: 1px solid var(--line-strong); border-radius: var(--radius-sm);
      background: rgba(0,0,0,0.3); color: var(--text);
      font-size: 0.96rem; font-family: var(--font);
      transition: all 0.25s var(--ease); outline: none;
    }
    .login-input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px var(--red-soft);
      background: rgba(0,0,0,0.4);
    }
    .login-input::placeholder { color: var(--text-mute); }
    .login-error {
      background: var(--red-soft); border: 1px solid rgba(255,32,64,0.25);
      border-radius: 8px; padding: 11px 14px; font-size: 0.82rem;
      color: #ff4d6a; margin-bottom: 18px; display: none;
      align-items: center; gap: 8px;
    }
    .login-error.show { display: flex; }
    .login-error svg { flex-shrink: 0; }
    .btn-login {
      width: 100%; padding: 15px; border-radius: var(--radius-sm);
      background: linear-gradient(120deg, var(--red), var(--red-deep)); color: #fff;
      font-weight: 700; font-size: 0.96rem; font-family: var(--font-hud);
      letter-spacing: 0.1em; text-transform: uppercase;
      box-shadow: 0 8px 24px var(--red-glow);
      transition: all 0.3s var(--ease);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 6px;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 12px 32px var(--red-glow); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.5; pointer-events: none; }
    .login-back {
      display: block; text-align: center; margin-top: 20px;
      color: var(--text-mute); font-size: 0.82rem; font-family: var(--mono);
      transition: color 0.2s;
    }
    .login-back:hover { color: var(--red-bright); }
    .login-footer {
      text-align: center; margin-top: 28px; padding-top: 20px;
      border-top: 1px solid var(--line);
      font-family: var(--mono); font-size: 0.68rem; color: var(--text-mute);
      letter-spacing: 0.1em;
    }
    .login-footer span { color: var(--red); }
    /* spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite;
      display: none;
    }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }

    /* Scanline background effect */
    .login-scan {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent 0, transparent 3px, rgba(255,32,64,0.012) 3px, rgba(255,32,64,0.012) 4px);
    }
  </style>
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>
  <div class="login-scan" aria-hidden="true"></div>

  <div class="login-page">
    <div class="login-card">
      <div class="login-corner-tl"></div>

      <!-- Logo -->
      <div class="login-logo">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 48 48" width="48" height="48" fill="none">
            <circle cx="24" cy="24" r="22" stroke="rgba(255,32,64,0.2)" stroke-width="1"/>
            <path d="M24 2 A22 22 0 0 1 46 24" stroke="#ff2040" stroke-width="1.5" stroke-linecap="round"/>
            <text x="24" y="29" text-anchor="middle" font-family="'Orbitron', sans-serif" font-weight="800" font-size="16" fill="#ff2040" letter-spacing="3">KNT</text>
            <defs>
              <linearGradient id="kg3" x1="0" y1="0" x2="48" y2="48">
                <stop offset="0" stop-color="#ff2040" stop-opacity="0.9"/>
                <stop offset="1" stop-color="#c80820" stop-opacity="0.2"/>
              </linearGradient>
            </defs>
          </svg>
        </span>
      </div>
      <h1 class="login-title">NEURAL ACCESS</h1>
      <p class="login-sub">
        <span class="teacher-badge">TEACHER MODE</span>
        &nbsp;KNT OS v2.0
      </p>

      <!-- Error message -->
      <div class="login-error" id="loginError">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff4d6a" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/>
        </svg>
        <span id="loginErrorText">รหัสผ่านไม่ถูกต้อง</span>
      </div>

      <!-- Form -->
      <form id="loginForm" autocomplete="off">
        <div class="field-group">
          <label class="field-label" for="username">ผู้ใช้</label>
          <div class="field-icon-wrap">
            <span class="field-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M5 21a7 7 0 0 1 14 0"/></svg>
            </span>
            <input type="text" id="username" class="login-input" placeholder="ชื่อผู้ใช้" value="ครูนิวตรอน" readonly />
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="password">รหัสผ่าน</label>
          <div class="field-icon-wrap">
            <span class="field-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/></svg>
            </span>
            <input type="password" id="password" class="login-input" placeholder="ป้อนรหัสผ่าน" autofocus />
          </div>
        </div>

        <div id="passwordHint" style="text-align:center;margin-bottom:14px;"></div>

        <button type="submit" class="btn-login" id="btnLogin">
          <span class="btn-text">ACCESS GRANTED</span>
          <span class="spinner"></span>
        </button>
      </form>

      <a href="index.html" class="login-back">← BACK TO PORTAL</a>

      <div class="login-footer">
        KNT OS v2.0 · <span>NEURAL INTERFACE</span> © 2026
      </div>
    </div>
  </div>

  <script>
  (function () {
    "use strict";

    // --- Password hash (SHA-256) ---
    const PASSWORD_HASH = "a96caacc78434461b8664705cbad2a9b490aa2b61ffe78bbc87b5a3e9d607d22";

    // --- Redirect if already logged in ---
    if (sessionStorage.getItem("knt-auth") === "teacher") {
      const returnTo = new URLSearchParams(location.search).get("return") || "index.html";
      window.location.replace(returnTo);
      return;
    }

    const form = document.getElementById("loginForm");
    const passwordInput = document.getElementById("password");
    const btnLogin = document.getElementById("btnLogin");
    const loginError = document.getElementById("loginError");
    const loginErrorText = document.getElementById("loginErrorText");

    // --- Simple SHA-256 ---
    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
    }

    // --- Handle login ---
    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const password = passwordInput.value.trim();
      if (!password) {
        showError("กรุณาป้อนรหัสผ่าน");
        passwordInput.focus();
        return;
      }

      btnLogin.classList.add("loading");
      btnLogin.disabled = true;
      hideError();

      try {
        const hash = await sha256(password);

        if (hash === PASSWORD_HASH) {
          sessionStorage.setItem("knt-auth", "teacher");
          sessionStorage.setItem("knt-user", "ครูนิวตรอน");

          const returnTo = new URLSearchParams(location.search).get("return") || "index.html";
          btnLogin.style.background = "linear-gradient(120deg, #2ee07c, #1a8c4a)";
          btnLogin.querySelector(".btn-text").textContent = "✓ ACCESS GRANTED";
          btnLogin.classList.remove("loading");

          setTimeout(() => {
            window.location.replace(returnTo);
          }, 500);
        } else {
          showError("รหัสผ่านไม่ถูกต้อง กรุณาลองอีกครั้ง");
          passwordInput.value = "";
          passwordInput.focus();
        }
      } catch (err) {
        showError("เกิดข้อผิดพลาด กรุณาลองใหม่");
        console.error(err);
      } finally {
        btnLogin.classList.remove("loading");
        btnLogin.disabled = false;
      }
    });

    function showError(msg) {
      loginErrorText.textContent = msg;
      loginError.classList.add("show");
    }

    function hideError() {
      loginError.classList.remove("show");
    }

    passwordInput.addEventListener("input", hideError);
  })();
  </script>
</body>
</html>

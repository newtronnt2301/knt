<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0e3f74">
  <meta name="description" content="KNT Classroom พื้นที่การเรียนรู้สำหรับนักเรียน">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="KNT Classroom">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=8">
  <title>KNT Classroom</title>
</head>
<body>
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>

  <div class="app-shell">
    <aside class="desktop-sidebar" aria-label="เมนูหลัก">
      <a class="brand" href="#home" data-route="home" aria-label="KNT Classroom หน้าแรก">
        <img class="brand-mark" src="icons/icon.svg" alt="">
        <span><b>KNT</b><small>Classroom</small></span>
      </a>
      <nav class="side-nav"></nav>
      <div class="sidebar-note">
        <span class="sparkle">✦</span>
        <b>ตั้งใจเรียนวันนี้</b>
        <span>เก่งขึ้นอีกนิดทุกวัน</span>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <a class="mobile-brand" href="#home" data-route="home">
          <img class="brand-mark" src="icons/icon.svg" alt="">
          <b>KNT Classroom</b>
        </a>
        <div class="top-actions">
          <button class="role-button" type="button" id="roleButton" aria-haspopup="true" aria-expanded="false">
            <svg aria-hidden="true"><use href="#icon-switch"></use></svg>
            <span id="roleLabel">นักเรียน</span>
          </button>
          <button class="icon-button" type="button" id="installButton" aria-label="ติดตั้งแอป" title="ติดตั้งแอป" hidden>
            <svg aria-hidden="true"><use href="#icon-download"></use></svg>
          </button>
          <button class="icon-button notification-button" type="button" aria-label="การแจ้งเตือน">
            <svg aria-hidden="true"><use href="#icon-bell"></use></svg><i></i>
          </button>
          <button class="mini-avatar" type="button" data-route="profile" aria-label="เปิดโปรไฟล์">ธ</button>
        </div>
      </header>

      <div id="view" class="view" tabindex="-1"></div>
    </main>

    <nav class="bottom-nav" aria-label="เมนูหลัก"></nav>
  </div>

  <div class="role-popover" id="rolePopover" hidden>
    <button type="button" data-role="student"><span class="role-option-icon student">นร.</span><span><b>โหมดนักเรียน</b><small>เรียน ทำข้อสอบ และส่งงาน</small></span><svg><use href="#icon-check"></use></svg></button>
    <button type="button" data-role="teacher"><span class="role-option-icon teacher">ครู</span><span><b>โหมดครู</b><small>เช็กชื่อ ตรวจงาน และจัดการคะแนน</small></span><svg><use href="#icon-check"></use></svg></button>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <svg class="svg-sprite" aria-hidden="true">
    <symbol id="icon-home" viewBox="0 0 24 24"><path d="M3 10.8 12 3l9 7.8v9.7a.5.5 0 0 1-.5.5H15v-6H9v6H3.5a.5.5 0 0 1-.5-.5z"/></symbol>
    <symbol id="icon-book" viewBox="0 0 24 24"><path d="M4 4.8A2.8 2.8 0 0 1 6.8 2H20v17H6.5A2.5 2.5 0 0 0 4 21.5z"/><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M8 6h8M8 10h6"/></symbol>
    <symbol id="icon-exam" viewBox="0 0 24 24"><path d="M7 3h10a2 2 0 0 1 2 2v16H5V5a2 2 0 0 1 2-2Z"/><path d="m8 9 1.3 1.3L12 7.7M8 15l1.3 1.3L12 13.7M14 9h2M14 15h2"/></symbol>
    <symbol id="icon-task" viewBox="0 0 24 24"><path d="M5 4h14v17H5z"/><path d="M9 2h6v4H9zM8 11h8M8 15h8"/></symbol>
    <symbol id="icon-user" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4.5 21a7.5 7.5 0 0 1 15 0"/></symbol>
    <symbol id="icon-bell" viewBox="0 0 24 24"><path d="M18 9a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9ZM10 21h4"/></symbol>
    <symbol id="icon-download" viewBox="0 0 24 24"><path d="M12 3v12m-4-4 4 4 4-4M4 20h16"/></symbol>
    <symbol id="icon-arrow" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></symbol>
    <symbol id="icon-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></symbol>
    <symbol id="icon-check" viewBox="0 0 24 24"><path d="m5 12 4 4L19 6"/></symbol>
    <symbol id="icon-settings" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2.8 2.8-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6v.2h-4V21a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1L4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9A1.7 1.7 0 0 0 3 14H2.8v-4H3a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9L4.2 7 7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3A1.7 1.7 0 0 0 10 3V2.8h4V3a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1L19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.2v4H21a1.7 1.7 0 0 0-1.6 1Z"/></symbol>
    <symbol id="icon-shield" viewBox="0 0 24 24"><path d="M12 3 4.5 6v5.5c0 4.7 3.2 8 7.5 9.5 4.3-1.5 7.5-4.8 7.5-9.5V6z"/><path d="m9 12 2 2 4-4"/></symbol>
    <symbol id="icon-help" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9.8 9a2.3 2.3 0 1 1 3.2 2.1c-.7.3-1 1-1 1.9M12 17h.01"/></symbol>
    <symbol id="icon-switch" viewBox="0 0 24 24"><path d="M7 7h12l-3-3M17 17H5l3 3"/></symbol>
    <symbol id="icon-camera" viewBox="0 0 24 24"><path d="M3 7h4l2-3h6l2 3h4v13H3z"/><circle cx="12" cy="13" r="4"/></symbol>
    <symbol id="icon-chart" viewBox="0 0 24 24"><path d="M4 20V10h4v10M10 20V4h4v16M16 20v-7h4v7"/></symbol>
    <symbol id="icon-grid" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></symbol>
    <symbol id="icon-external" viewBox="0 0 24 24"><path d="M14 4h6v6M20 4l-9 9M19 14v6H4V5h6"/></symbol>
    <symbol id="icon-users" viewBox="0 0 24 24"><circle cx="9" cy="8" r="4"/><path d="M2 21a7 7 0 0 1 14 0M16 4a4 4 0 0 1 0 8M18 14a7 7 0 0 1 4 7"/></symbol>
    <symbol id="icon-qr" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3h4M14 21h7M21 14v3"/></symbol>
    <symbol id="icon-money" viewBox="0 0 24 24"><path d="M4 6h16v12H4z"/><circle cx="12" cy="12" r="3"/><path d="M7 9H4M20 15h-3"/></symbol>
  </svg>

  <script src="roster-data.js?v=7" defer></script>
  <script src="app.js?v=15" defer></script>
</body>
</html>

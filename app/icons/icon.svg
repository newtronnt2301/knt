<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">KNT Classroom</title>
  <desc id="desc">A navy blue mathematics app icon with a white K and cyan math symbols.</desc>
  <defs>
    <linearGradient id="background" x1="54" y1="30" x2="465" y2="485" gradientUnits="userSpaceOnUse">
      <stop stop-color="#164D86"/>
      <stop offset="1" stop-color="#092B59"/>
    </linearGradient>
    <linearGradient id="cyan" x1="104" y1="126" x2="404" y2="386" gradientUnits="userSpaceOnUse">
      <stop stop-color="#43C7FF"/>
      <stop offset="1" stop-color="#168BE0"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background keeps the mark safe for Android maskable icons. -->
  <rect width="512" height="512" fill="url(#background)"/>
  <circle cx="428" cy="80" r="112" fill="#53C8FF" opacity=".10"/>
  <circle cx="82" cy="452" r="136" fill="#000E2A" opacity=".18"/>
  <!-- K, designed to stay clear even at the smallest home-screen size. -->
  <path d="M114 116h59v112l103-112h77L234 246l128 150h-78L173 267v129h-59z" fill="#fff"/>
  <!-- A compact mathematics panel completes the mark without making it busy. -->
  <g fill="none" stroke="url(#cyan)" stroke-linecap="round" stroke-linejoin="round" stroke-width="16">
    <rect x="320" y="167" width="79" height="79" rx="16"/>
    <rect x="320" y="278" width="79" height="79" rx="16"/>
    <path d="M346 206h27m-13-13v27M346 318h27m-26-27 26 27m0-27-26 27"/>
  </g>
  <path d="M330 409h84" stroke="#67D3FF" stroke-linecap="round" stroke-width="13"/>
  <path d="M351 409h42" stroke="#fff" stroke-linecap="round" stroke-width="5" opacity=".92"/>
</svg>
